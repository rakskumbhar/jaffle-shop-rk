version: 2

models:
  - name: int_providers__unified
    description: >
      Unified provider record joining NPI registry, credentialing, and EMR sources.
      One row per NPI with the most current data from each source system.
      Cross-source entity resolution is performed via NPI number matching.
    config:
      meta:
        owner: "Provider Data Engineering"
        sla_tier: "tier2"
        contains_pii: true
    columns:
      - name: npi_number
        description: "10-digit National Provider Identifier - natural key"
        config:
          meta: {pii: true}
        tests:
          - not_null
          - unique

      - name: first_name
        config:
          meta: {pii: true}
        tests: [not_null]

      - name: last_name
        config:
          meta: {pii: true}
        tests: [not_null]

      - name: npi_status
        description: "NPI lifecycle status from CMS"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['A', 'D', 'R']

      - name: credential_status
        description: "Current credentialing status"
        tests:
          - accepted_values:
              arguments:
                values: ['ACTIVE', 'EXPIRED', 'PENDING', 'REVOKED']

  - name: int_providers__deduped
    description: >
      Deduplicated provider records. Applies ranking logic to select the most
      authoritative record per NPI when multiple source records exist.
    config:
      meta:
        owner: "Provider Data Engineering"
        sla_tier: "tier2"
        contains_pii: true
    columns:
      - name: provider_dedup_key
        description: "Surrogate key based on NPI"
        tests:
          - not_null
          - unique

      - name: npi_number
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('int_providers__unified')
              field: npi_number

  - name: int_provider_network__affiliations
    description: >
      Provider network participation records enriched with current participation
      status logic. One row per provider-network combination.
    config:
      meta:
        owner: "Provider Data Engineering"
        sla_tier: "tier2"
        contains_pii: false
    columns:
      - name: affiliation_sk
        description: "Surrogate key for affiliation record"
        tests:
          - not_null
          - unique

      - name: npi_number
        tests:
          - not_null
          - relationships:
              to: ref('int_providers__unified')
              field: npi_number

      - name: participation_status
        tests:
          - accepted_values:
              arguments:
                values: ['PARTICIPATING', 'TERMINATED', 'SUSPENDED']
