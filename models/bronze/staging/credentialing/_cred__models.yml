version: 2

models:
  - name: stg_cred__providers
    description: >
      Staging view over raw provider credentialing records. Renames and casts
      columns from the credentialing source system.
    config:
      meta:
        owner: "Provider Data Engineering"
        contains_pii: false
    columns:
      - name: credentialing_id
        description: "Unique identifier from credentialing system"
        tests:
          - not_null
          - unique

      - name: npi_number
        description: "10-digit National Provider Identifier for cross-reference"
        tests:
          - not_null
          - valid_npi_format

      - name: specialty_code
        description: "Provider specialty classification code"

      - name: credential_status
        description: "Current credentialing status"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['ACTIVE', 'EXPIRED', 'PENDING', 'REVOKED']

      - name: credential_effective_date
        description: "Date credential became effective"
        tests: [not_null]

      - name: credential_expiry_date
        description: "Date credential expires"

      - name: _source_loaded_at
        description: "Timestamp when record was loaded into raw ingestion"
        tests: [not_null]
