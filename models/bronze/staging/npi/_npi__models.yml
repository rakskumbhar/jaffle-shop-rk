version: 2

models:
  - name: stg_npi__registry
    description: >
      Staging view over raw NPI registry records from CMS. Renames and casts
      columns for downstream consumption.
    config:
      meta:
        owner: "Provider Data Engineering"
        contains_pii: true
    columns:
      - name: npi_number
        description: "10-digit National Provider Identifier"
        config:
          meta: {pii: true}
        tests:
          - not_null
          - unique
          - valid_npi_format

      - name: first_name
        description: "Provider first name"
        config:
          meta: {pii: true}
        tests: [not_null]

      - name: last_name
        description: "Provider last name"
        config:
          meta: {pii: true}
        tests: [not_null]

      - name: npi_status
        description: "NPI lifecycle status: A=Active, D=Deactivated, R=Retired"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['A', 'D', 'R']

      - name: enumeration_date
        description: "Date NPI was first assigned"
        tests: [not_null]

      - name: _source_loaded_at
        description: "Timestamp when record was loaded into raw ingestion"
        tests: [not_null]
