version: 2

models:
  - name: stg_network__affiliations
    description: >
      Staging view over raw network affiliation records. Renames and casts
      columns from the network management source system.
    config:
      meta:
        owner: "Provider Data Engineering"
        contains_pii: false
    columns:
      - name: network_affiliation_id
        description: "Unique identifier for the network affiliation record"
        tests:
          - not_null
          - unique

      - name: npi_number
        description: "10-digit National Provider Identifier"
        tests:
          - not_null
          - valid_npi_format

      - name: network_name
        tests: [not_null]

      - name: participation_status
        tests:
          - accepted_values:
              arguments:
                values: ['PARTICIPATING', 'TERMINATED', 'SUSPENDED']

      - name: effective_date
        description: "Date network participation became effective"
        tests: [not_null]

      - name: _source_loaded_at
        description: "Timestamp when record was loaded into raw ingestion"
        tests: [not_null]
