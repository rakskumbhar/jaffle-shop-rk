version: 2

sources:
  - name: npi_registry
    description: "National Provider Identifier registry - CMS public dataset"
    database: SNOWFLAKE_LEARNING_DB
    schema: RAW_INGESTION
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 72, period: hour}
    loaded_at_field: _loaded_at
    tables:
      - name: npi_raw
        description: "Raw NPI registry records"
        columns:
          - name: npi_number
            description: "10-digit National Provider Identifier"
          - name: status
            description: "NPI status: A=Active, D=Deactivated"

  - name: credentialing
    description: "Provider credentialing system"
    database: SNOWFLAKE_LEARNING_DB
    schema: RAW_INGESTION
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 72, period: hour}
    loaded_at_field: _loaded_at
    tables:
      - name: provider_credentials_raw
        description: "Raw credentialing records"
        columns:
          - name: npi_number
            description: "Provider NPI for cross-reference"

  - name: emr
    description: "Electronic Medical Records system - provider master"
    database: SNOWFLAKE_LEARNING_DB
    schema: RAW_INGESTION
    freshness:
      warn_after: {count: 12, period: hour}
      error_after: {count: 48, period: hour}
    loaded_at_field: _loaded_at
    tables:
      - name: provider_master_raw
        description: "EMR provider master file with practice locations"
        columns:
          - name: npi_number
            description: "Provider NPI for cross-reference"

  - name: claims
    description: "Claims processing system"
    database: SNOWFLAKE_LEARNING_DB
    schema: RAW_INGESTION
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 72, period: hour}
    loaded_at_field: _loaded_at
    tables:
      - name: claims_raw
        description: "Raw medical claims"
        columns:
          - name: npi_number
            description: "Rendering provider NPI"
          - name: claim_id
            description: "Unique claim identifier"

  - name: network
    description: "Network management system"
    database: SNOWFLAKE_LEARNING_DB
    schema: RAW_INGESTION
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 72, period: hour}
    loaded_at_field: _loaded_at
    tables:
      - name: network_affiliations_raw
        description: "Provider network participation records"
