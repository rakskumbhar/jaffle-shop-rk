version: 2

models:
  - name: audit__run_metadata
    description: >
      Tracks each dbt invocation with start/end timestamps and duration.
      One row per dbt run for operational monitoring.
    columns:
      - name: run_id
        description: "dbt invocation ID - unique per run"
        tests:
          - not_null
          - unique

  - name: audit__source_row_counts
    description: >
      Captures row counts for all source tables on each dbt run.
      Used for trend monitoring and anomaly detection on data volume.
    columns:
      - name: row_count_id
        tests:
          - not_null
          - unique

  - name: audit__reject_summary
    description: >
      Aggregated rejection counts by model and reason per dbt run.
      Primary alerting table for data quality issues.
    columns:
      - name: summary_id
        tests:
          - not_null

  - name: reject_stg_npi__registry
    description: "Rejected rows from NPI registry staging with validation failure reasons"
    columns:
      - name: reject_id
        tests: [not_null]

  - name: reject_stg_cred__providers
    description: "Rejected rows from credentialing staging with validation failure reasons"
    columns:
      - name: reject_id
        tests: [not_null]

  - name: reject_stg_emr__providers
    description: "Rejected rows from EMR staging with validation failure reasons"
    columns:
      - name: reject_id
        tests: [not_null]

  - name: reject_stg_claims__providers
    description: "Rejected rows from claims staging with validation failure reasons"
    columns:
      - name: reject_id
        tests: [not_null]

  - name: reject_stg_network__affiliations
    description: "Rejected rows from network affiliations staging with validation failure reasons"
    columns:
      - name: reject_id
        tests: [not_null]
