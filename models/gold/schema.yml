version: 2

models:
  - name: dim_provider
    description: >
      SCD Type 2 provider dimension — one row per provider per change event.
      Sourced from snp_provider_attributes snapshot. Contains both current
      and historical records with valid_from/valid_to date windows.
    config:
      meta:
        owner: "Provider Data Engineering"
        sla_tier: "tier1"
        contains_pii: true
        retention_days: 2555
      contract:
        enforced: true
    columns:
      - name: provider_sk
        description: "Surrogate key (stable across history) based on NPI + valid_from"
        data_type: varchar
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null

      - name: npi_number
        description: "10-digit National Provider Identifier - natural key"
        data_type: varchar(10)
        config:
          meta: {pii: true}
        constraints:
          - type: not_null
        tests:
          - not_null
          - valid_npi_format

      - name: valid_from
        description: "SCD2 row effective start timestamp"
        data_type: timestamp_ntz
        constraints:
          - type: not_null
        tests: [not_null]

      - name: valid_to
        description: "SCD2 row effective end timestamp (9999-12-31 for current)"
        data_type: timestamp_ntz
        constraints:
          - type: not_null
        tests: [not_null]

      - name: is_current
        description: "Boolean flag indicating current active record"
        data_type: boolean
        tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: first_name
        data_type: varchar
        config:
          meta: {pii: true}

      - name: last_name
        data_type: varchar
        config:
          meta: {pii: true}

      - name: full_name
        data_type: varchar
        config:
          meta: {pii: true}

      - name: credentials
        data_type: varchar

      - name: gender_code
        data_type: varchar
        tests:
          - accepted_values:
              arguments:
                values: ['M', 'F']
              config:
                where: "entity_type_code = '1'"

      - name: gender_description
        data_type: varchar

      - name: entity_type_code
        data_type: varchar

      - name: entity_type
        data_type: varchar

      - name: is_sole_proprietor
        data_type: varchar

      - name: npi_status
        data_type: varchar
        tests:
          - accepted_values:
              arguments:
                values: ['A', 'D', 'R']

      - name: npi_status_description
        data_type: varchar

      - name: enumeration_date
        data_type: date

      - name: deactivation_date
        data_type: date

      - name: reactivation_date
        data_type: date

      - name: is_npi_active
        data_type: boolean

      - name: specialty_code
        data_type: varchar

      - name: specialty_description
        data_type: varchar

      - name: primary_taxonomy_code
        data_type: varchar

      - name: board_certification
        data_type: varchar

      - name: credential_status
        data_type: varchar

      - name: credential_effective_date
        data_type: date

      - name: credential_expiry_date
        data_type: date

      - name: is_credentialed
        data_type: boolean

      - name: facility_name
        data_type: varchar

      - name: address_line_1
        data_type: varchar
        config:
          meta: {pii: true}

      - name: address_line_2
        data_type: varchar
        config:
          meta: {pii: true}

      - name: city
        data_type: varchar

      - name: state_code
        data_type: varchar

      - name: zip_code
        data_type: varchar

      - name: phone_number
        data_type: varchar
        config:
          meta: {pii: true}

      - name: is_accepting_patients
        data_type: boolean

      - name: provider_status
        data_type: varchar

      - name: is_fully_active
        description: "Composite flag: NPI active + credentialed + EMR active"
        data_type: boolean
        tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: _record_updated_at
        data_type: timestamp_ntz

      - name: _dbt_loaded_at
        data_type: timestamp_ltz

  - name: fct_provider_visits
    description: >
      Fact table of provider visits/claims. One row per claim with financial
      amounts and status information. Incremental with merge strategy.
    config:
      meta:
        owner: "Provider Data Engineering"
        sla_tier: "tier1"
        contains_pii: true
        retention_days: 2555
      contract:
        enforced: true
    columns:
      - name: visit_sk
        description: "Surrogate key based on claim_id"
        data_type: varchar
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null

      - name: claim_id
        description: "Source system claim identifier"
        data_type: varchar
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null

      - name: npi_number
        description: "Rendering provider NPI"
        data_type: varchar(10)
        constraints:
          - type: not_null
        tests:
          - not_null
          - valid_npi_format

      - name: patient_id
        data_type: varchar
        config:
          meta: {pii: true}

      - name: service_date
        data_type: date
        constraints:
          - type: not_null
        tests:
          - not_null
          - no_future_dates

      - name: procedure_code
        data_type: varchar

      - name: diagnosis_code
        data_type: varchar

      - name: allowed_amount
        data_type: number(12,2)
        constraints:
          - type: not_null
        tests:
          - not_null
          - positive_amount

      - name: paid_amount
        data_type: number(12,2)
        constraints:
          - type: not_null
        tests:
          - not_null
          - positive_amount

      - name: claim_status
        data_type: varchar
        tests:
          - accepted_values:
              arguments:
                values: ['PAID', 'DENIED', 'PENDING', 'ADJUSTED']

      - name: network_status
        data_type: varchar

      - name: net_paid_amount
        data_type: number(12,2)

      - name: patient_responsibility
        data_type: number(12,2)

      - name: _source_loaded_at
        data_type: timestamp_ntz

      - name: _dbt_loaded_at
        data_type: timestamp_ltz

  - name: provider_360_summary
    description: >
      One Big Table (OBT) — wide denormalized row per NPI with all domain
      attributes: demographics, network, credentialing status, quality scores,
      and visit volume. Primary consumer-facing analytical table.
    config:
      meta:
        owner: "Provider Data Engineering"
        sla_tier: "tier1"
        contains_pii: true
        retention_days: 2555
      contract:
        enforced: true
    columns:
      - name: npi_number
        description: "Provider NPI - primary grain of this table"
        data_type: varchar(10)
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null
          - valid_npi_format

      - name: first_name
        data_type: varchar
        config:
          meta: {pii: true}

      - name: last_name
        data_type: varchar
        config:
          meta: {pii: true}

      - name: full_name
        data_type: varchar
        config:
          meta: {pii: true}

      - name: credentials
        data_type: varchar

      - name: gender_code
        data_type: varchar

      - name: entity_type_code
        data_type: varchar

      - name: npi_status
        data_type: varchar

      - name: specialty_code
        data_type: varchar

      - name: specialty_description
        data_type: varchar

      - name: primary_taxonomy_code
        data_type: varchar

      - name: board_certification
        data_type: varchar

      - name: credential_status
        data_type: varchar

      - name: credential_effective_date
        data_type: date

      - name: credential_expiry_date
        data_type: date

      - name: facility_name
        data_type: varchar

      - name: city
        data_type: varchar

      - name: state_code
        data_type: varchar

      - name: zip_code
        data_type: varchar

      - name: phone_number
        data_type: varchar
        config:
          meta: {pii: true}

      - name: is_accepting_patients
        data_type: boolean

      - name: provider_status
        data_type: varchar

      - name: is_fully_active
        data_type: boolean
        constraints:
          - type: not_null
        tests:
          - not_null

      - name: total_claims
        data_type: number(18,0)
        constraints:
          - type: not_null
        tests:
          - not_null

      - name: unique_patients
        data_type: number(18,0)

      - name: total_allowed_amount
        data_type: number(18,2)

      - name: total_paid_amount
        data_type: number(18,2)

      - name: first_service_date
        data_type: date

      - name: last_service_date
        data_type: date

      - name: denied_claims
        data_type: number(18,0)

      - name: denial_rate_pct
        data_type: float

      - name: total_networks
        data_type: number(18,0)

      - name: active_networks
        data_type: number(18,0)

      - name: active_network_list
        data_type: varchar

      - name: _dbt_loaded_at
        data_type: timestamp_ltz

  - name: dim_provider_network
    description: >
      Provider network dimension — one row per provider-network affiliation.
      Includes tenure calculation and current participation status.
    meta:
      owner: "Provider Data Engineering"
      sla_tier: "tier1"
      contains_pii: false
      retention_days: 2555
    config:
      contract:
        enforced: true
    columns:
      - name: provider_network_sk
        description: "Surrogate key for provider-network affiliation"
        data_type: varchar
        constraints:
          - type: not_null
        tests:
          - unique
          - not_null

      - name: network_affiliation_id
        data_type: varchar

      - name: npi_number
        data_type: varchar(10)
        constraints:
          - type: not_null
        tests:
          - not_null
          - valid_npi_format

      - name: network_name
        data_type: varchar
        constraints:
          - type: not_null
        tests: [not_null]

      - name: network_tier
        data_type: varchar

      - name: participation_status
        data_type: varchar
        tests:
          - accepted_values:
              arguments:
                values: ['PARTICIPATING', 'TERMINATED', 'SUSPENDED']

      - name: effective_date
        data_type: date

      - name: termination_date
        data_type: date

      - name: par_agreement_type
        data_type: varchar

      - name: is_currently_participating
        data_type: boolean

      - name: tenure_days
        data_type: number(18,0)

      - name: _source_loaded_at
        data_type: timestamp_ntz

      - name: _dbt_loaded_at
        data_type: timestamp_ltz

  - name: vw_dim_provider_current
    description: "Consumer view exposing only current (is_current=true) provider dimension rows"
    config:
      meta:
        owner: "Provider Data Engineering"
        sla_tier: "tier1"

  - name: vw_fct_provider_visits
    description: "Consumer view over the provider visits fact table"
    config:
      meta:
        owner: "Provider Data Engineering"
      sla_tier: "tier1"
